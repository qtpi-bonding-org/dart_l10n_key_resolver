name: l10n_key_resolver
description: A build_runner generator that creates type-safe resolvers for l10n keys, mapping dot-notation keys (error.auth.failed) to ARB camelCase getters (errorAuthFailed).
version: 0.1.0
repository: https://github.com/qtpi-bonding/dart_l10n_key_resolver

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  build: ^2.4.0
  path: ^1.8.0

dev_dependencies:
  build_runner: ^2.4.0
  build_test: ^2.2.0
  test: ^1.24.0
  lints: ^3.0.0
